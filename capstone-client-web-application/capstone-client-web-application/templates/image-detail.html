<div class="modal-backdrop" onclick="hideModalForm()">
  <div class="modal-dialog" role="document" onclick="event.stopPropagation()">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{name}}</h5>
        <button type="button" class="btn-close" onclick="hideModalForm()" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center">
        <img src="{{imageUrl}}" alt="{{name}}" style="max-width:100%; border-radius: var(--radius-sm);">
      </div>
    </div>
  </div>
</div>
